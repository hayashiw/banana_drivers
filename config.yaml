# config.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Single source of truth for all banana driver scripts:
#   01_stage1_driver.py      (VMEC fixed-boundary optimization)
#   02_stage2_driver.py      (coil-only optimization)
#   03_singlestage_driver.py (joint coil + surface optimization)
#   utils/init_boozersurface.py (coil + surface initialization)
#
# Hardware constraint thresholds are fixed physical limits from the device
# design (coil-coil clearance, max curvature from bending radius, max coil
# length from available conductor).  Unlike qi_drivers, these are NOT
# expressed with relaxation factors — the values are non-negotiable.
# ─────────────────────────────────────────────────────────────────────────────

# ── Warm-start paths ─────────────────────────────────────────────────────────
# Input paths are relative to banana_drivers/. Output filenames are resolved
# against the output directory ($SCRATCH/banana_drivers_outputs/ or ./outputs/).
warm_start:
  wout_filepath: "inputs/wout_nfp22ginsburg_000_014417_iota15.nc"       # seed wout for 01_stage1 warm start
  init_bsurf_filepath: "inputs/boozersurface.init.json"                 # from 01_stage1
  stage1_wout_filename: "stage1_wout_opt.nc"                            # from 01_stage1 (resolved against output dir)
  stage2_bsurf_filename: "stage2_boozersurface_opt.json"                # from 02_stage2 (resolved against output dir)

# ── Device geometry ──────────────────────────────────────────────────────────
device:
  nfp: 5
  stellsym: true
  major_radius: 0.976     # m (TF coil + winding surface R0)
  plasma_radius: 0.925    # m (target plasma major radius)

# ── TF coils (fixed, not optimized) ─────────────────────────────────────────
tf_coils:
  current: 100.0e+3    # A
  num: 20
  nfp: 1
  stellsym: false
  R0: 0.976             # m
  R1: 0.4               # m
  order: 1

# ── Banana coils ─────────────────────────────────────────────────────────────
banana_coils:
  current_init: 10.0e+3    # A — initial current for optimization
  current_max: 16.0e+3     # A — hardware upper bound
  current_cap_stage2: false # If true, apply L-BFGS-B bound in stage 2; if false, unbounded
  nfp: 5
  order: 2                 # Fourier order (order=4 produces bad shapes)
  nqpts: 128               # Quadrature points on curve
  curv_p: 4                # Curvature Lp-norm exponent (L4 > L2 for banana coils)
  # Initial Fourier coefficients
  phi0: 0.06
  phi1: 0.03
  theta0: 0.5
  theta1: 0.1

# ── Winding surface ─────────────────────────────────────────────────────────
winding_surface:
  R0: 0.976       # m (major radius, same as TF)
  a: 0.215        # m (minor radius)

# ── Plasma surface (VMEC) ───────────────────────────────────────────────────
plasma_surface:
  nphi: 255
  ntheta: 64
  vmec_s: 0.24    # Flux surface label
  vmec_R: 0.925   # Target major radius (m)

# ── Stage 1 (VMEC fixed-boundary optimization) ──────────────────────────────
stage1:
  cold_start: false                    # true = build boundary from scratch; false = load wout

  # Resolution ramp: each entry is one optimization step
  max_mode_steps: [1, 2, 3]           # Boundary Fourier modes freed at each step
  vmec_mpol: [3, 4, 5]               # VMEC mpol at each step
  vmec_ntor: [3, 4, 5]               # VMEC ntor at each step
  boozer_mpol: [16, 24, 32]          # booz_xform mpol at each step
  boozer_ntor: [16, 24, 32]          # booz_xform ntor at each step
  max_nfev: [50, 50, 50]             # Max function evaluations per step

  # QA target (M=1, N=0)
  qs_surfaces: [0.25, 0.5, 0.75]     # Flux surfaces for QS targeting

  # Physics targets (overridable via BANANA_IOTA, BANANA_VOLUME env vars)
  iota_target: 0.15
  aspect_target: 6.45
  volume_target: 0.5767               # m^3 (from seed wout)

  # Objective weights
  aspect_weight: 1.0
  iota_weight: 1.0
  volume_weight: 1.0
  qs_weight: 1.0

  # Cold start boundary shape (only used when cold_start=true)
  cold_start_R0: 1.0667              # Major radius (m)
  cold_start_a: 0.1655               # Minor radius (m)
  cold_start_phiedge: 0.083          # Total toroidal flux (Wb)

# ── Boozer surface (singlestage) ────────────────────────────────────────────
boozer:
  mpol: 8
  ntor: 6
  constraint_weight: 1.0   # BoozerLS constraint weight

# ── Physics targets (singlestage) ───────────────────────────────────────────
targets:
  volume: 0.10      # m^3
  iota: 0.15        # Edge rotational transform

# ── Hardware constraint thresholds ───────────────────────────────────────────
# These are fixed physical limits.  Do NOT add relaxation factors.
thresholds:
  # Stage 2
  length_max: 1.75          # m — max banana coil length
  coil_coil_min: 0.05       # m — min coil-coil clearance
  curvature_max_stage2: 40  # m^-1 — max curvature (stage 2, looser)
  # Singlestage
  coil_surface_min: 0.02    # m — min coil-surface clearance
  curvature_max_ss: 20      # m^-1 — max curvature (singlestage, tighter)

# ── Stage 2 objective weights ────────────────────────────────────────────────
stage2_weights:
  squared_flux: 1.0e+0
  length: 5.0e-4
  coil_coil: 1.0e+2
  curvature: 1.0e-4

# ── Stage 2 optimizer (L-BFGS-B) ────────────────────────────────────────────
stage2_optimizer:
  maxiter: 500
  maxcor: 300
  maxfun: 10000
  tol: 1.0e-15
  ftol: 1.0e-15
  gtol: 1.0e-6

# ── Singlestage objective weights ───────────────────────────────────────────
singlestage_weights:
  nonqs: 1.0e+0
  boozer_residual: 1.0e+3
  iota: 1.0e+2
  length: 1.0e+0
  coil_coil: 1.0e+2
  coil_surface: 1.0e+0
  curvature: 1.0e-1
  current: 1.0e+2     # Penalty weight for banana current > current_max (16 kA)

# ── Singlestage optimizer (L-BFGS-B) ────────────────────────────────────────
singlestage_optimizer:
  maxiter: 500
  maxcor: 300
  maxfun: 10000
  tol: 1.0e-15
  ftol: 1.0e-5
  gtol: 1.0e-2
