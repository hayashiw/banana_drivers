# config.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Single source of truth for all banana driver scripts:
#   01_stage1_driver.py      (VMEC fixed-boundary optimization)
#   02_stage2_driver.py      (coil-only optimization)
#   03_singlestage_driver.py (joint coil + surface optimization)
#   utils/init_boozersurface.py (coil + surface initialization)
#
# Hardware constraint thresholds are fixed physical limits from the device
# design (coil-coil clearance, max curvature from bending radius, max coil
# length from available conductor).  Unlike qi_drivers, these are NOT
# expressed with relaxation factors — the values are non-negotiable.
# ─────────────────────────────────────────────────────────────────────────────

# ── Warm-start paths ─────────────────────────────────────────────────────────
# Input paths are relative to banana_drivers/. Output filenames are resolved
# against the output directory ($SCRATCH/banana_drivers_outputs/ or ./outputs/).
warm_start:
  wout_filepath: "inputs/wout_stage1_seed.nc"                           # resized seed wout (LCFS = target boundary);
                                                                         # produced by utils/vmec_resize.py from the
                                                                         # original wout_nfp22ginsburg_000_014417_iota15.nc
  init_bsurf_filepath: "inputs/stage1_boozersurface_opt.json"           # from 01_stage1
  stage1_wout_filename: "wout_stage1.nc"                                # from 01_stage1 (resolved against output dir)
  stage2_bsurf_filename: "stage2_boozersurface_opt.json"                # from 02_stage2 (resolved against output dir)

# ── Device geometry ──────────────────────────────────────────────────────────
device:
  nfp: 5
  stellsym: true
  major_radius: 0.976     # m (TF coil + winding surface R0)
  plasma_radius: 0.925    # m (target plasma major radius)

# ── TF coils (fixed, not optimized) ─────────────────────────────────────────
tf_coils:
  current: 100.0e+3    # A
  num: 20
  nfp: 1
  stellsym: false
  R0: 0.976             # m
  R1: 0.4               # m
  order: 1

# ── Banana coils ─────────────────────────────────────────────────────────────
banana_coils:
  current_init: 10.0e+3         # A — initial current for optimization
  current_max: 16.0e+3          # A — hardware upper bound (enforced in singlestage)

  # Stage 2 current handling mode (override via BANANA_CURRENT_MODE_S2).
  #   'fixed'     — (default) pin the banana current at current_fixed_stage2
  #                 and drop it from the free DOF set. Shape-only optimization
  #                 in stage 2; singlestage handles joint current + shape.
  #   'penalized' — keep current free, add QuadraticPenalty(|I|, soft_max, "max")
  #                 to the ALM constraint list so current can drift up to
  #                 current_soft_max_stage2 without a hard cliff.
  #   'free'      — keep current free, no current constraint. WARNING: can
  #                 collapse to 0 kA if the initial coil shapes give lower
  #                 normalized SquaredFlux with only TF field (see run 51246996).
  current_mode_stage2: fixed
  current_fixed_stage2: 16.0e+3     # A — pinned physical current when mode='fixed'
  current_soft_max_stage2: 20.0e+3  # A — soft cap when mode='penalized'.
                                #     Stage 2 is a warm-start generator, not a
                                #     final design — we let current drift up to
                                #     ~20 kA if it helps SquaredFlux converge,
                                #     then singlestage drives it back down to
                                #     the hardware limit (16 kA).
  current_cap_stage2: false     # Legacy: L-BFGS-B hard bound in 'weighted' mode
                                # only. ALM mode uses current_mode_stage2 above.
  nfp: 5
  order: 2                 # Fourier order (order=4 produces bad shapes)
  nqpts: 128               # Quadrature points on curve
  curv_p: 4                # Curvature Lp-norm exponent (L4 > L2 for banana coils)
  # Initial Fourier coefficients
  phi0: 0.06
  phi1: 0.03
  theta0: 0.5
  theta1: 0.1

# ── Winding surface ─────────────────────────────────────────────────────────
winding_surface:
  R0: 0.976       # m (major radius, same as TF)
  a: 0.215        # m (minor radius)

# ── Plasma surface (VMEC) ───────────────────────────────────────────────────
# In the current pipeline, stage 1 warm-starts from a resized seed wout whose
# LCFS (s=1) IS the target plasma boundary — so downstream drivers load s=1.
# vmec_s is kept in config for flexibility (finite-beta / core extraction
# experiments may want an inner surface again) but the default is 1.0.
plasma_surface:
  nphi: 255
  ntheta: 64
  vmec_s: 1.0     # Flux surface label in the stage 1 wout (1.0 = LCFS = target boundary)
  vmec_R: 0.925   # Target major radius (m)

# ── Stage 1 seed wout preprocessing (utils/vmec_resize.py) ──────────────────
# One-time preprocessing step: extract the inner_s surface of the original
# seed wout, rescale to vmec_R, remap the iota profile, and re-solve VMEC to
# produce a new wout whose LCFS (s=1) IS the target plasma boundary. The
# output is written to warm_start.wout_filepath and used as the stage 1 seed.
#
# Rationale: the original wout was sized such that its s=0.24 surface matched
# the physical plasma boundary; the outer 76% of its volume was auxiliary.
# Running stage 1 directly against the original LCFS (our previous mistake)
# optimizes the wrong equilibrium. See the jhalpern30 reference script
# STAGE_2/banana_coil_solver.py for the original extraction approach.
stage1_resize:
  seed_wout_filepath: "inputs/wout_nfp22ginsburg_000_014417_iota15.nc"  # original seed
  output_filepath: "inputs/wout_stage1_seed.nc"                         # resized output
  inner_s: 0.24            # Flux surface label in the seed to use as the new LCFS
  poly_deg: 4              # Iota profile polynomial degree (VMEC power_series)
  mpol: 5
  ntor: 5
  ns_array: [13, 25, 51]
  niter_array: [1000, 2000, 5000]
  ftol_array: [1.0e-10, 1.0e-12, 1.0e-14]

# ── Stage 1 (VMEC fixed-boundary optimization) ──────────────────────────────
stage1:
  cold_start: false                    # true = build boundary from scratch; false = load wout

  # Resolution ramp: each entry is one optimization step
  max_mode_steps: [1, 2, 3]           # Boundary Fourier modes freed at each step
  vmec_mpol: [3, 4, 5]               # VMEC mpol at each step
  vmec_ntor: [3, 4, 5]               # VMEC ntor at each step
  boozer_mpol: [16, 24, 32]          # booz_xform mpol at each step
  boozer_ntor: [16, 24, 32]          # booz_xform ntor at each step
  max_nfev: [50, 50, 50]             # Max function evaluations per step

  # QA target (M=1, N=0)
  qs_surfaces: [0.25, 0.5, 0.75]     # Flux surfaces for QS targeting

  # Physics targets (overridable via BANANA_IOTA, BANANA_VOLUME env vars).
  # Updated for the resized stage 1 seed (s=0.24 extraction of original wout):
  #   aspect  = 12.70   — measured from wout_stage1_seed.nc LCFS (anchor)
  #   volume  = 0.0969  — measured from wout_stage1_seed.nc LCFS (anchor)
  #   iota    = 0.15    — physics target on iota_edge; seed has iota_edge=0.120
  # Only iota_edge is driven by the stage 1 objective — iota_axis is left free
  # so stage 1 can preserve whatever magnetic shear the QA optimization prefers.
  iota_target: 0.15
  aspect_target: 12.70
  volume_target: 0.0969               # m^3 (from resized seed wout LCFS)

  # Objective weights
  aspect_weight: 1.0
  iota_weight: 1.0
  volume_weight: 1.0
  qs_weight: 1.0

  # Cold start boundary shape (only used when cold_start=true)
  cold_start_R0: 1.0667              # Major radius (m)
  cold_start_a: 0.1655               # Minor radius (m)
  cold_start_phiedge: 0.083          # Total toroidal flux (Wb)

# ── Boozer surface (singlestage) ────────────────────────────────────────────
boozer:
  mpol: 8
  ntor: 6
  constraint_weight: 1.0e+3 # BoozerLS constraint weight

# ── Physics targets (singlestage) ───────────────────────────────────────────
targets:
  volume: 0.10      # m^3
  iota: 0.15        # Edge rotational transform

# ── Hardware constraint thresholds ───────────────────────────────────────────
# These are fixed physical limits.  Do NOT add relaxation factors.
thresholds:
  # Stage 2
  length_max: 1.75          # m — max banana coil length
  coil_coil_min: 0.05       # m — min coil-coil clearance
  curvature_max_stage2: 40  # m^-1 — max curvature (stage 2, looser)
  # Singlestage
  coil_surface_min: 0.02    # m — min coil-surface clearance
  curvature_max_ss: 20      # m^-1 — max curvature (singlestage, tighter)

# ── Stage 2 mode selector ────────────────────────────────────────────────────
# Which stage-2 solver to use:
#   'alm'      — augmented Lagrangian method (default; constraint list, no cliffs)
#   'weighted' — legacy fixed-weight L-BFGS-B (single weighted scalar objective)
stage2_mode: weighted

# ── Stage 2 objective weights (legacy 'weighted' mode) ──────────────────────
stage2_weights:
  squared_flux: 1.0e+0
  length: 5.0e-4
  coil_coil: 1.0e+2
  curvature: 1.0e-4

# ── Stage 2 optimizer (legacy 'weighted' mode, L-BFGS-B) ────────────────────
# Stage 2 convergence philosophy (2026-04-09): truncated iteration budget,
# gtol and ftol both set to unreachable (1e-15) so the exit is always the
# maxiter cap. Stage 2 is only required to produce a "good enough to warm
# start singlestage" state — the real stage 2 health check is a post-run
# Poincare trace (iota + surface nesting), not L-BFGS-B's gradient norm.
# Matches jhalpern30's banana_coil_solver.py philosophy but with a larger
# budget (600 vs 300). Run 51286115 showed the landscape plateaus at
# grad_inf≈1e-8 with no further meaningful descent — pushing gtol/ftol tighter
# buys 7th-decimal SquaredFlux improvements that don't change the coil-field
# iota (confirmed by Poincare 51287878), so we stop wasting iterations on it.
stage2_optimizer:
  maxiter: 600
  maxcor: 300
  maxfun: 10000
  tol: 1.0e-15
  ftol: 1.0e-15    # unreachable — force maxiter as the exit path
  gtol: 1.0e-15    # unreachable — force maxiter as the exit path

# ── Stage 2 ALM (augmented Lagrangian method) ──────────────────────────────
# f=None and all objectives (including SquaredFlux) live in the constraint list.
# ALM ramps per-constraint penalty weights μᵢ in an outer loop and updates
# Lagrange multipliers λᵢ as constraints become satisfied. Inner loop is
# L-BFGS-B on a smooth augmented Lagrangian — no penalty cliffs.
#
# SquaredFlux uses its native `threshold` parameter (ported from PedroGil's
# simsopt_alm_temp — see fluxobjective.py): J() returns 0.0 and dJ() returns
# zero B_vjp once sq_flux < sqf_threshold. This gives a clean "constraint
# inactive" state for ALM (c=0, ∇c=0) without a QuadraticPenalty wrap.
stage2_alm:
  # Preset selector (override via BANANA_ALM_PRESET env var):
  #   'throttled'   — (default) inner loop is step-limited via dof_scale and
  #                   maxfun cap, gentle penalty growth (tau=2), many outer
  #                   iterations. Designed for stiff constraint landscapes
  #                   (banana coils near hardware limits).
  #   'unthrottled' — inner loop runs to full convergence (no dof_scale, no
  #                   maxfun cap), aggressive penalty growth (tau=10), fewer
  #                   outer iterations. Matches PedroGil's simsopt_alm_temp
  #                   examples. Better when constraints are not near cliffs.
  # Individual keys below override the preset defaults. Env var overrides
  # (BANANA_TAU, BANANA_DOF_SCALE, etc.) override everything.
  preset: throttled

  mu_init: 1.0e+3      # initial penalty parameter (> 1; scalar applies to all).
                       # Raised from 10 to shorten the outer ramp phase — run 51251125
                       # needed μ_sqf to climb 12 orders of magnitude (10 → 5.5e12)
                       # before the inner L-BFGS-B took its first real step, at which
                       # point the step was a giant cliff-jump (curv 30 → 52 m⁻¹ in one
                       # outer iter). Starting closer to the working μ gives the inner
                       # loop more, smaller descent steps instead of two large ones.
  tau: 2               # penalty growth factor for violated constraints (2-10+, problem-dependent).
                       # Lowered from 4 to prevent μ_curv from monopolizing the search
                       # direction before current has room to climb (see 51236325 failure).
  maxiter: 1000        # inner L-BFGS-B maxiter per outer step
  maxfun: 100          # inner L-BFGS-B maxfun per outer step (qi_drivers pattern:
                       # don't over-optimize a stale penalty level — let the outer loop do the work)
  maxiter_lag: 80      # outer ALM iterations.
                       # Stage 2 is a warm-start generator — we don't need
                       # tight convergence, just a reasonable basin for
                       # singlestage to take over. Run 51238490 showed that
                       # iters 70+ produced only oscillation.
  grad_tol: 1.0e-12    # gradient norm convergence tolerance
  c_tol: 1.0e-8        # constraint norm (inf) convergence tolerance.
                       # length/cc/curv are self-clipping squared penalties
                       # (LpCurveLength etc.) so their contribution to c is in
                       # SQUARED units. Jsqf uses its native threshold (no
                       # wrap) and enters c in linear units. c_tol=1e-8
                       # corresponds to a ~1e-4 residual on the squared terms.
                       # A linear-units value like 1e-3 makes the initial
                       # state trivially "satisfied" and ALM exits with no
                       # descent at iter 1 (see run 51248041).
  dof_scale: 0.1       # DOF coordinate rescaling: y = x / dof_scale. Smaller values
                       # make each inner L-BFGS-B step smaller in physical space, but
                       # do NOT bound total displacement per outer iter. Set to null
                       # to disable (unthrottled preset default).
  sqf_threshold: 1.0e-15  # SquaredFlux noise floor passed to SquaredFlux(threshold=...).
                          # J()=0 and dJ() returns zero B_vjp once sq_flux < sqf_threshold.
                          # This is a NOISE FLOOR, not a convergence target — matches
                          # PedroGil's simsopt_alm_temp examples (9/10 use 1e-15 or 1e-16,
                          # see examples/3_Advanced/auglag/*.py). Run 51252548 showed that
                          # a loose value like 1e-3 causes catastrophic coil-coil collapse:
                          # Jsqf clips to 0 early, removing the only objective that
                          # prevents the banana coils from imploding into each other,
                          # leaving ALM to satisfy length/cc/curv trivially with collapsed
                          # coils (CC went 0.0956 → 0.00173 m in 5 iters).

# ── Singlestage objective weights ───────────────────────────────────────────
singlestage_weights:
  nonqs: 1.0e+0
  boozer_residual: 1.0e+3
  iota: 1.0e+2
  length: 1.0e+0
  coil_coil: 1.0e+2
  coil_surface: 1.0e+0
  curvature: 1.0e-1
  current: 1.0e+2     # Penalty weight for banana current > current_max (16 kA)

# ── Singlestage optimizer (L-BFGS-B) ────────────────────────────────────────
singlestage_optimizer:
  maxiter: 500
  maxcor: 300
  maxfun: 10000
  tol: 1.0e-15
  ftol: 1.0e-5
  gtol: 1.0e-2
